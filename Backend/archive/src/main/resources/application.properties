# Configuration de l'application
spring.application.name=archive
server.port=8080

# Configuration de la base de données PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate
spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=true

# Configuration de la sécurité
spring.security.filter.order=10

# Configuration JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION}

#flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Configuration Jackson pour gérer les références circulaires
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuration Jackson supplémentaire
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.deserialization.accept-single-value-as-array=true

# MinIO Configuration
minio.endpoint=${MINIO_URL}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket=${MINIO_BUCKET}

# Blockchain
blockchain.rpc-url=${POLYGON_RPC_URL}
blockchain.private-key=${POLYGON_PRIVATE_KEY}
blockchain.contract-address=${POLYGON_CONTRACT_ADDRESS}

#S3
#s3.bucket=${S3_BUCKET}
#s3.access-key=${S3_ACCESS_KEY}
#s3.secret-key=${S3_SECRET_KEY}
#s3.expiry-hours=${S3_EXPIRY_HOURS}

# S3/Minio provider
storage.provider=${STORAGE_PROVIDER}

# Tess4J
tesseract.data-path=${TESSERACT_DATA_PATH}

#Ollama
ollama.base-url=${OLLAMA_BASE_URL}

#Meilisearch
meilisearch.host=${MEILISEARCH_HOST}
meilisearch.api-key=${MEILI_MASTER_KEY}

#LibreOffice
libreoffice.work-dir=/tmp/libreoffice-work
libreoffice.timeout-seconds=60


